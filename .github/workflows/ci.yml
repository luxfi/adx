name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25.5'
  NODE_VERSION: '20'
  DOCKER_REGISTRY: registry.lux.network
  GOPRIVATE: github.com/luxfi/*
  GONOSUMDB: github.com/luxfi/*

jobs:
  # Code Quality
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
          args: --timeout 5m

      - name: Run gosec security scanner
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out security.sarif ./... || true

      - name: Upload security results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: security.sarif

  # Unit Tests
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libzmq3-dev
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install zeromq
          fi

      - name: Run tests
        continue-on-error: true
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./pkg/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-${{ matrix.os }}-${{ matrix.go }}
