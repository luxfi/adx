name: Release
on:
  push:
    tags:
    - v*
permissions:
  contents: write
jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.5
    - name: Run tests
      run: |
        go test -v -short ./pkg/lx/... ./pkg/mlx/... ./test/unit/...
    - name: Build binaries
      run: |
        mkdir -p dist

        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lx-dex-linux-amd64 ./cmd/demo
        GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lx-dex-linux-arm64 ./cmd/demo
        GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lx-dex-darwin-amd64 ./cmd/demo
        GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lx-dex-darwin-arm64 ./cmd/demo
        GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/lx-dex-windows-amd64.exe ./cmd/demo

        # Build server binaries
        GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/dex-server-linux-amd64 ./cmd/dex-server
        GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/dex-server-darwin-arm64 ./cmd/dex-server

        # Create checksums
        cd dist && sha256sum * > checksums.txt
    - name: Create Release Notes
      id: release_notes
      run: "VERSION=${GITHUB_REF#refs/tags/}\necho \"VERSION=$VERSION\" >> $GITHUB_OUTPUT\n\ncat << EOF > release-notes.md\n\
        # LX DEX $VERSION\n\n## Features\n- **Ultra-high performance**: 100M+ trades/sec capability\n- **Sub-microsecond latency**:\
        \ <1\u03BCs order matching\n- **Multi-engine architecture**: Pure Go, C++, and GPU (MLX)\n- **Quantum-resistant consensus**:\
        \ FPC with Ringtail+BLS signatures\n\n## Binaries\n\n### Demo Application\n- \\`lx-dex-linux-amd64\\` - Linux x86_64\n\
        - \\`lx-dex-linux-arm64\\` - Linux ARM64\n- \\`lx-dex-darwin-amd64\\` - macOS Intel\n- \\`lx-dex-darwin-arm64\\` -\
        \ macOS Apple Silicon\n- \\`lx-dex-windows-amd64.exe\\` - Windows x86_64\n\n### DEX Server\n- \\`dex-server-linux-amd64\\\
        ` - Linux server\n- \\`dex-server-darwin-arm64\\` - macOS server\n\n## Installation\n\n\\`\\`\\`bash\n# Download for\
        \ your platform\ncurl -L https://github.com/luxfi/dex/releases/download/$VERSION/lx-dex-\\$(uname -s | tr '[:upper:]'\
        \ '[:lower:]')-\\$(uname -m) -o lx-dex\nchmod +x lx-dex\n./lx-dex\n\\`\\`\\`\n\n## Performance\n- Order matching:\
        \ ~1\u03BCs latency\n- Throughput: 100M+ trades/sec (with GPU)\n- Consensus: 50ms finality\n\n## Checksums\nSee \\\
        `checksums.txt\\` for SHA256 hashes of all binaries.\nEOF\n"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: LX DEX ${{ steps.release_notes.outputs.VERSION }}
        body_path: release-notes.md
        draft: false
        prerelease: false
        files: |
          dist/*
